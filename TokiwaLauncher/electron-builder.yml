appId: 'com.gradex.tokiwalauncher'
productName: 'Tokiwa Launcher'
artifactName: '${productName}-setup-${version}.${ext}'

copyright: 'Copyright © 2026 Tokiwa Haruto'

asar: true
compression: 'maximum'

files:
  - '!{dist,.gitignore,.vscode,docs,dev-app-update.yml,.nvmrc,eslint.config.mjs}'

extraResources:
  - 'libraries'

# Windows Configuration
win: 
  target: 
    - target: 'nsis'
      arch: 'x64'

# Windows Installer Configuration
nsis:
  oneClick: false
  perMachine: false
  allowElevation: true
  allowToChangeInstallationDirectory: true

# macOS Configuration
mac:
  target:
    - target: 'dmg'
      arch:
        - 'x64'
        - 'arm64'
  artifactName: '${productName}-setup-${version}-${arch}.${ext}'
  category: 'public.app-category.games'

# Linux Configuration
linux: 
  target: 'AppImage'
  maintainer: 'Tokiwa Haruto'
  vendor: 'Tokiwa Haruto'
  synopsis: 'GradeX Minecraft Launcher'
  description: 'Custom launcher for GradeX Minecraft servers. All mods, configurations, and updates are handled automatically.'
  category: 'Game'

publish:
  - provider: github
    owner: NvdaAnsel
    repo: TokiwaLauncher

directories:
  buildResources: 'build'
  output: 'dist'
